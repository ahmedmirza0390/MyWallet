<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My AED Savings Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: white; }
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.25); }
        .big-number { font-size: 3.5rem; line-height: 1; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        input, button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">My AED Savings Tracker 💰</h1>
                <p class="text-xl mt-1 opacity-90">For Ameera & our family ❤️ • All in AED</p>
            </div>
            <button onclick="resetAllData()" class="px-6 py-3 bg-white/20 hover:bg-white/30 rounded-3xl text-sm font-medium transition">Reset All Data</button>
        </div>

        <!-- Savings -->
        <div class="glass rounded-3xl p-8 mb-8 text-center">
            <p class="uppercase tracking-widest text-sm opacity-75 mb-2">Your Current Available Savings</p>
            <div id="savings" class="big-number font-bold">د.إ 0</div>
            <p id="savings-date" class="text-sm opacity-75 mt-2"></p>
        </div>

        <!-- Summary -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-3xl p-6"><div class="flex items-center gap-3"><span class="text-3xl">🏦</span><div><p class="text-sm opacity-75">Bank Accounts</p><div id="total-banks" class="text-3xl font-semibold">د.إ 0</div></div></div></div>
            <div class="glass rounded-3xl p-6"><div class="flex items-center gap-3"><span class="text-3xl">💳</span><div><p class="text-sm opacity-75">Credit Used</p><div id="total-credit" class="text-3xl font-semibold text-rose-200">د.إ 0</div></div></div></div>
            <div class="glass rounded-3xl p-6"><div class="flex items-center gap-3"><span class="text-3xl">📈</span><div><p class="text-sm opacity-75">Monthly Income</p><div id="total-income" class="text-3xl font-semibold">د.إ 0</div></div></div></div>
            <div class="glass rounded-3xl p-6"><div class="flex items-center gap-3"><span class="text-3xl">📉</span><div><p class="text-sm opacity-75">Monthly Commitments</p><div id="total-expenses" class="text-3xl font-semibold text-rose-200">د.إ 0</div></div></div></div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 border-b border-white/20 overflow-x-auto pb-1">
            <button onclick="showTab(0)" id="tab-0" class="tab-button active px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">Dashboard</button>
            <button onclick="showTab(1)" id="tab-1" class="tab-button px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">Banks</button>
            <button onclick="showTab(2)" id="tab-2" class="tab-button px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">Credit Cards</button>
            <button onclick="showTab(3)" id="tab-3" class="tab-button px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">Income</button>
            <button onclick="showTab(4)" id="tab-4" class="tab-button px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">Expenses</button>
            <button onclick="showTab(5)" id="tab-5" class="tab-button px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">Transactions</button>
            <button onclick="showTab(6)" id="tab-6" class="tab-button px-8 py-3 rounded-t-3xl font-medium whitespace-nowrap">History</button>
        </div>

        <div id="content-1" class="tab-content hidden"></div>
        <div id="content-2" class="tab-content hidden"></div>
        <div id="content-3" class="tab-content hidden"></div>
        <div id="content-4" class="tab-content hidden"></div>
        <div id="content-5" class="tab-content hidden"></div>
        <div id="content-6" class="tab-content hidden"></div>
    </div>

    <!-- BEAUTIFUL MODAL -->
    <div id="modal" onclick="if(event.target.id==='modal')hideModal()" class="hidden fixed inset-0 bg-black/60 flex items-end md:items-center justify-center z-50">
        <div onclick="event.stopImmediatePropagation()" class="modal glass w-full max-w-lg mx-4 md:mx-0 rounded-3xl p-8 mb-4 md:mb-0">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6"></h2>
            
            <div id="modal-fields" class="space-y-6"></div>

            <div class="flex gap-4 mt-10">
                <button onclick="hideModal()" class="flex-1 py-4 text-white font-medium rounded-3xl border border-white/30 hover:bg-white/10 transition">Cancel</button>
                <button onclick="saveModal()" class="flex-1 py-4 bg-white text-indigo-700 font-semibold rounded-3xl transition">Save</button>
            </div>
        </div>
    </div>

    <script>
        let data = { banks: [], creditCards: [], incomes: [], expenses: [], transactions: [], history: [] };
        let currentEdit = { type: null, id: null };

        function loadData() {
            const saved = localStorage.getItem('aedSavingsData');
            if (saved) data = JSON.parse(saved);
            else {
                data = {
                    banks: [{id:1, name:"Emirates NBD Savings", balance:8500}],
                    creditCards: [],
                    incomes: [{id:1, name:"Monthly Salary", amount:18500}, {id:2, name:"Pocket Money from Husband", amount:2500}],
                    expenses: [{id:1, name:"Maid Fee (Ameera)", amount:1200}, {id:2, name:"Grocery Budget", amount:900}, {id:3, name:"Miscellaneous Dues", amount:450}],
                    transactions: [],
                    history: []
                };
                saveData();
            }
            renderAll();
        }

        function saveData() { localStorage.setItem('aedSavingsData', JSON.stringify(data)); }

        function calculateSavings() {
            const banks = data.banks.reduce((sum, b) => sum + (b.balance||0), 0);
            const income = data.incomes.reduce((sum, i) => sum + (i.amount||0), 0);
            const expense = data.expenses.reduce((sum, e) => sum + (e.amount||0), 0);
            const creditUsed = data.creditCards.reduce((sum, c) => sum + ((c.limit||0) - (c.remaining||0)), 0);
            const trans = data.transactions.reduce((sum, t) => sum + (t.amount||0), 0);
            return Math.round(banks + income - expense - creditUsed + trans);
        }

        function renderAll() {
            const savings = calculateSavings();
            document.getElementById('savings').textContent = `د.إ ${savings.toLocaleString('en-US')}`;
            document.getElementById('savings-date').textContent = `Updated just now • ${new Date().toLocaleDateString('en-GB')}`;

            document.getElementById('total-banks').textContent = `د.إ ${data.banks.reduce((s,b)=>s+(b.balance||0),0).toLocaleString('en-US')}`;
            const creditUsedTotal = data.creditCards.reduce((sum, c) => sum + ((c.limit||0) - (c.remaining||0)), 0);
            document.getElementById('total-credit').textContent = `د.إ ${creditUsedTotal.toLocaleString('en-US')}`;
            document.getElementById('total-income').textContent = `د.إ ${data.incomes.reduce((s,i)=>s+(i.amount||0),0).toLocaleString('en-US')}`;
            document.getElementById('total-expenses').textContent = `د.إ ${data.expenses.reduce((s,e)=>s+(e.amount||0),0).toLocaleString('en-US')}`;

            renderBanks(); renderCreditCards(); renderIncomes(); renderExpenses(); renderTransactions(); renderHistory();
        }

        function showTab(n) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active', 'bg-white/20'));
            document.getElementById('tab-' + n).classList.add('active', 'bg-white/20');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            if (n === 0) return;
            const el = document.getElementById('content-' + n);
            if (el) el.classList.remove('hidden');
        }

        function createContentDiv(n) {
            let div = document.getElementById('content-' + n);
            if (!div) {
                div = document.createElement('div');
                div.id = 'content-' + n;
                div.className = 'tab-content hidden';
                document.querySelector('.max-w-6xl').appendChild(div);
            }
            return div;
        }

        // ==================== MODAL SYSTEM ====================
        function showModal(type, editId = null) {
            currentEdit = { type, id: editId };
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const fields = document.getElementById('modal-fields');
            fields.innerHTML = '';

            if (type === 'bank') {
                title.textContent = editId ? 'Edit Bank Account' : 'Add Bank Account';
                const item = editId ? data.banks.find(i => i.id === editId) : {};
                fields.innerHTML = `
                    <div><label class="block text-sm opacity-75 mb-1">Bank Name</label><input id="modal-name" type="text" value="${item.name||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                    <div><label class="block text-sm opacity-75 mb-1">Current Balance (AED)</label><input id="modal-balance" type="number" value="${item.balance||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                `;
            }
            else if (type === 'credit') {
                title.textContent = editId ? 'Edit Credit Card' : 'Add Credit Card';
                const item = editId ? data.creditCards.find(i => i.id === editId) : {};
                fields.innerHTML = `
                    <div><label class="block text-sm opacity-75 mb-1">Card Name</label><input id="modal-name" type="text" value="${item.name||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                    <div><label class="block text-sm opacity-75 mb-1">Total Credit Limit (AED)</label><input id="modal-limit" type="number" value="${item.limit||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                    <div><label class="block text-sm opacity-75 mb-1">Remaining Limit (AED)</label><input id="modal-remaining" type="number" value="${item.remaining||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                `;
            }
            else if (type === 'income') {
                title.textContent = editId ? 'Edit Income' : 'Add Income';
                const item = editId ? data.incomes.find(i => i.id === editId) : {};
                fields.innerHTML = `
                    <div><label class="block text-sm opacity-75 mb-1">Income Source</label><input id="modal-name" type="text" value="${item.name||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                    <div><label class="block text-sm opacity-75 mb-1">Monthly Amount (AED)</label><input id="modal-amount" type="number" value="${item.amount||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                `;
            }
            else if (type === 'expense') {
                title.textContent = editId ? 'Edit Expense' : 'Add Expense';
                const item = editId ? data.expenses.find(i => i.id === editId) : {};
                fields.innerHTML = `
                    <div><label class="block text-sm opacity-75 mb-1">Expense Name</label><input id="modal-name" type="text" value="${item.name||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                    <div><label class="block text-sm opacity-75 mb-1">Monthly Amount (AED)</label><input id="modal-amount" type="number" value="${item.amount||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                `;
            }
            else if (type === 'transaction') {
                title.textContent = editId ? 'Edit Transaction' : 'New Transaction';
                const item = editId ? data.transactions.find(i => i.id === editId) : {};
                fields.innerHTML = `
                    <div><label class="block text-sm opacity-75 mb-1">Description</label><input id="modal-desc" type="text" value="${item.description||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                    <div><label class="block text-sm opacity-75 mb-1">Amount (use – for expense)</label><input id="modal-amount" type="number" step="0.01" value="${item.amount||''}" class="w-full bg-white/20 rounded-2xl px-4 py-4 text-white placeholder-white/50 focus:outline-none"></div>
                `;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentEdit = { type: null, id: null };
        }

        function saveModal() {
            const type = currentEdit.type;
            const id = currentEdit.id;

            if (type === 'bank') {
                const name = document.getElementById('modal-name').value.trim();
                const balance = parseFloat(document.getElementById('modal-balance').value);
                if (!name || isNaN(balance)) return alert("Please fill all fields");
                if (id) {
                    const item = data.banks.find(i => i.id === id);
                    item.name = name; item.balance = balance;
                } else {
                    data.banks.push({id: Date.now(), name, balance});
                }
            }
            else if (type === 'credit') {
                const name = document.getElementById('modal-name').value.trim();
                const limit = parseFloat(document.getElementById('modal-limit').value);
                const remaining = parseFloat(document.getElementById('modal-remaining').value);
                if (!name || isNaN(limit) || isNaN(remaining)) return alert("Please fill all fields");
                if (id) {
                    const item = data.creditCards.find(i => i.id === id);
                    item.name = name; item.limit = limit; item.remaining = remaining;
                } else {
                    data.creditCards.push({id: Date.now(), name, limit, remaining});
                }
            }
            else if (type === 'income') {
                const name = document.getElementById('modal-name').value.trim();
                const amount = parseFloat(document.getElementById('modal-amount').value);
                if (!name || isNaN(amount)) return alert("Please fill all fields");
                if (id) {
                    const item = data.incomes.find(i => i.id === id);
                    item.name = name; item.amount = amount;
                } else {
                    data.incomes.push({id: Date.now(), name, amount});
                }
            }
            else if (type === 'expense') {
                const name = document.getElementById('modal-name').value.trim();
                const amount = parseFloat(document.getElementById('modal-amount').value);
                if (!name || isNaN(amount)) return alert("Please fill all fields");
                if (id) {
                    const item = data.expenses.find(i => i.id === id);
                    item.name = name; item.amount = amount;
                } else {
                    data.expenses.push({id: Date.now(), name, amount});
                }
            }
            else if (type === 'transaction') {
                const desc = document.getElementById('modal-desc').value.trim();
                const amount = parseFloat(document.getElementById('modal-amount').value);
                if (!desc || isNaN(amount)) return alert("Please fill all fields");
                if (id) {
                    const item = data.transactions.find(i => i.id === id);
                    item.description = desc; item.amount = amount;
                } else {
                    data.transactions.push({id: Date.now(), date: new Date().toLocaleDateString('en-GB'), description: desc, amount});
                }
            }

            saveData();
            renderAll();
            hideModal();
        }

        // Render functions (same as before but now call showModal)
        function renderBanks() {
            const container = createContentDiv(1);
            container.innerHTML = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">Bank Accounts</h2><div id="banks-list" class="space-y-3"></div><button onclick="showModal('bank')" class="mt-6 w-full py-4 bg-white text-indigo-700 rounded-3xl font-semibold">+ Add Bank Account</button></div>`;
            const list = container.querySelector('#banks-list');
            list.innerHTML = data.banks.map(b => `
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl">
                    <div><p class="font-medium">${b.name}</p></div>
                    <div class="text-right">
                        <p class="text-2xl font-semibold">د.إ ${b.balance}</p>
                        <div class="mt-2 flex gap-4 text-xs">
                            <button onclick="showModal('bank', ${b.id})" class="text-blue-200">Edit</button>
                            <button onclick="deleteBank(${b.id})" class="text-rose-300">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<p class="opacity-50 py-8 text-center">No bank accounts yet</p>';
        }

        function renderCreditCards() {
            const container = createContentDiv(2);
            container.innerHTML = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">Credit Cards</h2><div id="cards-list" class="space-y-3"></div><button onclick="showModal('credit')" class="mt-6 w-full py-4 bg-white text-indigo-700 rounded-3xl font-semibold">+ Add Credit Card</button></div>`;
            const list = container.querySelector('#cards-list');
            list.innerHTML = data.creditCards.map(c => {
                const used = (c.limit || 0) - (c.remaining || 0);
                return `<div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl">
                    <div><p class="font-medium">${c.name}</p><p class="text-sm opacity-75">Limit: د.إ ${c.limit} • Remaining: د.إ ${c.remaining}</p></div>
                    <div class="text-right"><p class="text-2xl font-semibold text-rose-200">د.إ ${used}</p><p class="text-xs opacity-75">Used</p>
                    <div class="mt-2 flex gap-4 text-xs"><button onclick="showModal('credit', ${c.id})" class="text-blue-200">Edit</button><button onclick="deleteCreditCard(${c.id})" class="text-rose-300">Remove</button></div></div>
                </div>`;
            }).join('') || '<p class="opacity-50 py-8 text-center">No credit cards yet</p>';
        }

        function renderIncomes() { /* similar pattern */ 
            const container = createContentDiv(3);
            container.innerHTML = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">Monthly Income</h2><div id="income-list" class="space-y-3"></div><button onclick="showModal('income')" class="mt-6 w-full py-4 bg-white text-indigo-700 rounded-3xl font-semibold">+ Add Income Source</button></div>`;
            const list = container.querySelector('#income-list');
            list.innerHTML = data.incomes.map(i => `
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl">
                    <p class="font-medium">${i.name}</p>
                    <div class="text-right">
                        <p class="text-2xl font-semibold">د.إ ${i.amount}</p>
                        <div class="mt-2 flex gap-4 text-xs">
                            <button onclick="showModal('income', ${i.id})" class="text-blue-200">Edit</button>
                            <button onclick="deleteIncome(${i.id})" class="text-rose-300">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<p class="opacity-50 py-8 text-center">No income sources yet</p>';
        }

        function renderExpenses() { /* similar */ 
            const container = createContentDiv(4);
            container.innerHTML = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">Monthly Fixed Expenses</h2><div id="expenses-list" class="space-y-3"></div><button onclick="showModal('expense')" class="mt-6 w-full py-4 bg-white text-indigo-700 rounded-3xl font-semibold">+ Add Fixed Expense</button></div>`;
            const list = container.querySelector('#expenses-list');
            list.innerHTML = data.expenses.map(e => `
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl">
                    <p class="font-medium">${e.name}</p>
                    <div class="text-right">
                        <p class="text-2xl font-semibold text-rose-200">د.إ ${e.amount}</p>
                        <div class="mt-2 flex gap-4 text-xs">
                            <button onclick="showModal('expense', ${e.id})" class="text-blue-200">Edit</button>
                            <button onclick="deleteExpense(${e.id})" class="text-rose-300">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('') || '<p class="opacity-50 py-8 text-center">No fixed expenses yet</p>';
        }

        function renderTransactions() { /* similar */ 
            const container = createContentDiv(5);
            container.innerHTML = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">Recent Transactions</h2><div id="transactions-list" class="space-y-3 max-h-96 overflow-auto"></div><button onclick="showModal('transaction')" class="mt-6 w-full py-4 bg-white text-indigo-700 rounded-3xl font-semibold">+ Record New Transaction</button></div>`;
            const list = container.querySelector('#transactions-list');
            list.innerHTML = data.transactions.slice().reverse().map(t => `
                <div class="flex justify-between items-center bg-white/10 p-4 rounded-2xl">
                    <div><p>${t.description}</p><p class="text-xs opacity-60">${t.date}</p></div>
                    <div class="text-right">
                        <p class="${t.amount >= 0 ? 'text-emerald-300' : 'text-rose-300'} font-semibold">${t.amount >= 0 ? '+' : ''}د.إ ${t.amount}</p>
                        <button onclick="deleteTransaction(${t.id})" class="text-rose-300 text-xs mt-2 block">Remove</button>
                    </div>
                </div>
            `).join('') || '<p class="opacity-50 py-8 text-center">No transactions yet</p>';
        }

        function renderHistory() {
            const container = createContentDiv(6);
            let html = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">History & Backups</h2><div class="space-y-4">`;
            if (data.history.length === 0) {
                html += `<p class="opacity-50 py-12 text-center">No backups yet.<br>Click "Reset All Data" to create your first backup.</p>`;
            } else {
                html += data.history.map(h => `
                    <div class="bg-white/10 p-5 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="font-medium">${h.timestamp}</p>
                            <p class="text-emerald-300">Savings: د.إ ${h.savings.toLocaleString('en-US')}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="restoreSnapshot(${h.id})" class="px-6 py-2 bg-emerald-400 text-white rounded-2xl text-sm font-medium">Restore</button>
                            <button onclick="deleteSnapshot(${h.id})" class="px-6 py-2 bg-rose-300 text-white rounded-2xl text-sm font-medium">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
            html += `</div></div>`;
            container.innerHTML = html;
        }

        // Delete functions
        function deleteBank(id){ if(confirm('Remove this bank account?')){ data.banks = data.banks.filter(b=>b.id!==id); saveData(); renderAll(); }}
        function deleteCreditCard(id){ if(confirm('Remove this credit card?')){ data.creditCards = data.creditCards.filter(c=>c.id!==id); saveData(); renderAll(); }}
        function deleteIncome(id){ if(confirm('Remove this income?')){ data.incomes = data.incomes.filter(i=>i.id!==id); saveData(); renderAll(); }}
        function deleteExpense(id){ if(confirm('Remove this expense?')){ data.expenses = data.expenses.filter(e=>e.id!==id); saveData(); renderAll(); }}
        function deleteTransaction(id){ if(confirm('Delete this transaction?')){ data.transactions = data.transactions.filter(t=>t.id!==id); saveData(); renderAll(); }}

        // Reset + History functions (same as before)
        function resetAllData() {
            if (!confirm("⚠️ Save a backup and clear everything?")) return;
            const snapshot = { id: Date.now(), timestamp: new Date().toLocaleString('en-GB'), savings: calculateSavings(), dataSnapshot: JSON.parse(JSON.stringify({banks:data.banks, creditCards:data.creditCards, incomes:data.incomes, expenses:data.expenses, transactions:data.transactions})) };
            data.history.unshift(snapshot);
            data.banks = []; data.creditCards = []; data.incomes = []; data.expenses = []; data.transactions = [];
            saveData(); renderAll();
            alert("✅ Backup saved in History tab!\nAll current data cleared.");
        }
        function restoreSnapshot(id) {
            const snap = data.history.find(h => h.id === id);
            if (!snap || !confirm("Restore this backup?")) return;
            Object.assign(data, snap.dataSnapshot);
            saveData(); renderAll(); showTab(0);
        }
        function deleteSnapshot(id) {
            if (!confirm("Delete this backup?")) return;
            data.history = data.history.filter(h => h.id !== id);
            saveData(); renderHistory();
        }

        window.onload = () => { loadData(); showTab(0); };
    </script>
</body>
</html>
