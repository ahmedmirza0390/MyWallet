<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My AED Savings Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: white; }
        .glass { background: rgba(255,255,255,0.15); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.25); }
        .big-number { font-size: 3.5rem; line-height: 1; }
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8 pb-24">
    <div class="max-w-6xl mx-auto">
        <!-- Header and rest of the UI stays exactly the same as last version -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold">My AED Savings Tracker 💰</h1>
                <p class="text-xl mt-1 opacity-90">For Ameera & our family ❤️ • All in AED</p>
            </div>
            <button onclick="resetAllData()" class="px-6 py-3 bg-white/20 hover:bg-white/30 rounded-3xl text-sm font-medium transition">Reset All Data</button>
        </div>

        <!-- Savings Display, Summary Cards, Tabs (same as previous version) -->
        <!-- ... (I kept the full working code from last version + new buttons) ... -->

        <!-- The rest of the code is the same as the last beautiful modal version, plus the new export/import functions below -->
    </div>

    <!-- Modal (same as last version) -->
    <div id="modal" onclick="if(event.target.id==='modal')hideModal()" class="hidden fixed inset-0 bg-black/60 flex items-end md:items-center justify-center z-50">
        <div onclick="event.stopImmediatePropagation()" class="modal glass w-full max-w-lg mx-4 md:mx-0 rounded-3xl p-8 mb-4 md:mb-0">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6"></h2>
            <div id="modal-fields" class="space-y-6"></div>
            <div class="flex gap-4 mt-10">
                <button onclick="hideModal()" class="flex-1 py-4 text-white font-medium rounded-3xl border border-white/30 hover:bg-white/10 transition">Cancel</button>
                <button onclick="saveModal()" class="flex-1 py-4 bg-white text-indigo-700 font-semibold rounded-3xl transition">Save</button>
            </div>
        </div>
    </div>

    <script>
        // ... (all the previous code for data, render functions, modal, etc. is kept exactly as in the last version you have) ...

        // NEW: Export & Import functions
        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mywallet-backup.json';
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ Full backup downloaded! You can now upload this file to your GitHub repo for permanent storage.');
        }

        function exportHistoryCSV() {
            let csv = "Timestamp,Savings (AED)\n";
            data.history.forEach(h => {
                csv += `"${h.timestamp}",${h.savings}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mywallet-history.csv';
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ History exported as CSV (open in Excel/Google Sheets)');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const importedData = JSON.parse(ev.target.result);
                        if (confirm('⚠️ This will REPLACE all current data and history with the imported backup.\n\nContinue?')) {
                            data = importedData;
                            saveData();
                            renderAll();
                            alert('✅ Data successfully imported!');
                        }
                    } catch (err) {
                        alert('❌ Invalid backup file');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Add these buttons in the History tab
        function renderHistory() {
            const container = createContentDiv(6);
            let html = `<div class="glass rounded-3xl p-6"><h2 class="text-2xl mb-4">History & Backups</h2>`;
            
            html += `<div class="flex gap-3 mb-6">
                <button onclick="exportData()" class="flex-1 py-3 bg-white text-indigo-700 rounded-3xl font-semibold">📤 Export All Data (JSON)</button>
                <button onclick="exportHistoryCSV()" class="flex-1 py-3 bg-white text-indigo-700 rounded-3xl font-semibold">📤 Export History (CSV)</button>
            </div>`;

            if (data.history.length === 0) {
                html += `<p class="opacity-50 py-12 text-center">No backups yet.<br>Click "Reset All Data" to create your first backup.</p>`;
            } else {
                html += data.history.map(h => `
                    <div class="bg-white/10 p-5 rounded-2xl flex justify-between items-center mb-3">
                        <div>
                            <p class="font-medium">${h.timestamp}</p>
                            <p class="text-emerald-300">Savings: د.إ ${h.savings.toLocaleString('en-US')}</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="restoreSnapshot(${h.id})" class="px-6 py-2 bg-emerald-400 text-white rounded-2xl text-sm font-medium">Restore</button>
                            <button onclick="deleteSnapshot(${h.id})" class="px-6 py-2 bg-rose-300 text-white rounded-2xl text-sm font-medium">Delete</button>
                        </div>
                    </div>
                `).join('');
            }

            html += `<button onclick="importData()" class="mt-6 w-full py-4 border border-white/30 hover:bg-white/10 rounded-3xl font-medium">📥 Import Backup from JSON file</button></div>`;
            container.innerHTML = html;
        }

        // Rest of your existing functions (loadData, calculateSavings, renderAll, modal system, etc.) remain unchanged
        // ... (full code continues with the same logic as the previous beautiful version) ...
    </script>
</body>
</html>
